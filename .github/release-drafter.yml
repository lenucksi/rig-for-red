nameTemplate: "v{{version}}"
tagTemplate: "v{{version}}"
categories:
  - title: "🚀 Features"
    labels:
      - feature
      - enhancement
  - title: "🐛 Bug Fixes"
    labels:
      - bug
      - fix
  - title: "🧰 Maintenance"
    labels:
      - chore
      - ci
      - refactor
      - dependencies
  - title: "📖 Documentation"
    labels:
      - docs
change-template: "- $TITLE (#$NUMBER)"
template: |
  ## Changes
  $CHANGES
  ## Contributors
  $CONTRIBUTORS
