name: Close Stale Issues/PRs

on:
  schedule:
    - cron: "30 1 * * *"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10
        with:
          stale-issue-message: "This issue has been stale for 60 days. Remove stale label or comment or this will be closed in 7 days."
          stale-pr-message: "This PR has been stale for 60 days. Remove stale label or comment or this will be closed in 7 days."
          close-issue-message: "This issue was closed because it has been stalled for 7 days with no activity."
          close-pr-message: "This PR was closed because it has been stalled for 7 days with no activity."
          days-before-stale: 60
          days-before-close: 7
          exempt-all-milestones: true
          exempt-pr-labels: dependencies
