name: pytest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-docker:
    name: HA ${{ matrix.core-version }} (Docker)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - core-version: "2026.1.3"
            python-version: "3.13"
          - core-version: "2026.2.3"
            python-version: "3.13"
    steps:
      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Build Docker image
        run: >
          docker build
          --build-arg HA_VERSION=${{ matrix.core-version }}
          -t rig-for-red-test
          -f Dockerfile.test
          .
      - name: Run tests
        run: docker run --rm rig-for-red-test --timeout=30

  test-dev:
    name: HA dev (Core checkout)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Check out Home Assistant core
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          repository: home-assistant/core
          path: core
          ref: dev
      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: "3.14"
      - name: Set up UV
        uses: astral-sh/setup-uv@v5
      - name: Create venv and install HA deps
        shell: bash
        run: |
          uv venv --python 3.14
          uv pip install -r core/requirements.txt
          uv pip install -r core/requirements_test.txt
          uv pip install pytest-cov freezegun
          uv pip install -e core/
      - name: Create symlinks
        shell: bash
        run: |
          ln -fs "$PWD/custom_components/rig_for_red" core/homeassistant/components/rig_for_red
          mkdir -p core/custom_components
          ln -fs "$PWD/custom_components/rig_for_red" core/custom_components/rig_for_red
          mkdir -p core/tests/components
          ln -fs "$PWD/tests/components/rig_for_red" core/tests/components/rig_for_red
          if [ -f tests/conftest.py ]; then
            ln -fs "$PWD/tests/conftest.py" core/tests/conftest.py
          fi
      - name: Run tests
        shell: bash
        run: |
          source .venv/bin/activate
          cd core
          PYTHONPATH="$PWD/..:$PYTHONPATH" python3 -X dev -m pytest \
            -vvv \
            --timeout=30 \
            --durations=10 \
            -p no:sugar \
            --override-ini=asyncio_mode=auto \
            --cov=custom_components.rig_for_red \
            --cov-report=term-missing \
            tests/components/rig_for_red
