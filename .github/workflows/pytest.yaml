name: pytest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-docker:
    name: HA ${{ matrix.core-version }} (Docker)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - core-version: "2026.1.3"
            python-version: "3.13"
          - core-version: "2026.2.3"
            python-version: "3.13"
    steps:
      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Build Docker image
        run: >
          docker build
          --build-arg HA_VERSION=${{ matrix.core-version }}
          -t rig-for-red-test
          -f Dockerfile.test
          .
      - name: Run tests
        run: docker run --rm rig-for-red-test --timeout=30

  # test-dev (Core checkout) DISABLED:
  # HA dev branch requires Python >=3.14, but pytest-asyncio has async generator
  # fixture compatibility issues with Python 3.14. Docker jobs cover stable testing.
  # Re-enable when pytest-asyncio supports Python 3.14.
